<div class="shell" [class.sidebar-open]="sidebarOpen()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 20V15H0V5H5V0H15V5H20V15H15V20H5ZM2 9H7C7.167 9 7.325 9.042 7.475 9.125L8.7 10.75L10.05 6.7C10.117 6.5 10.238 6.333 10.413 6.2C10.588 6.067 10.783 6 11 6C11.167 6 11.325 6.042 11.475 6.125L13.525 9H18V7H13V2H7V7H2V9ZM7 18H13V13H18V11H13C12.833 11 12.675 10.958 12.525 10.875L11.3 9.25L9.95 13.3C9.883 13.5 9.758 13.667 9.575 13.8C9.392 13.933 9.192 14 8.975 14L6.45 11H2V13H7V18Z" fill="white"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">Dawava</span>
        <span class="logo-sub">{{ roleLabel() }}</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      @for (item of navItems(); track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Bottom actions -->
    <div class="sidebar-footer">
      <button class="nav-item logout-btn" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Overlay for mobile -->
  @if (sidebarOpen()) {
    <div class="overlay" (click)="toggleSidebar()"></div>
  }

  <!-- Main content area -->
  <div class="main-wrap">
    <!-- Top Navbar -->
    <header class="topbar">
      <!-- Hamburger (mobile) -->
      <button class="hamburger" (click)="toggleSidebar()">
        <i class="pi pi-bars"></i>
      </button>

      <!-- Search -->
      <div class="search-box">
        <i class="pi pi-search search-icon"></i>
        <input type="text" placeholder="Search medicines, orders…"/>
      </div>

      <!-- Right actions -->
      <div class="topbar-right">
        <!-- Branch switcher (manager & staff only) -->
        @if (showBranchSwitcher()) {
          <app-branch-switcher/>
        }

        <!-- Dark mode toggle -->
        <button class="icon-btn" (click)="toggleTheme()" [title]="theme.isDark() ? 'Light mode' : 'Dark mode'">
          @if (theme.isDark()) {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          }
        </button>

        <!-- Notifications -->
        <button class="icon-btn notif-btn">
          <i class="pi pi-bell"></i>
          <span class="notif-dot"></span>
        </button>

        <div class="divider"></div>

        <!-- User -->
        <div class="user-chip">
          @if (avatarUrl()) {
            <img [src]="avatarUrl()" [alt]="user?.fullName" class="user-avatar"/>
          } @else {
            <div class="user-avatar initials">{{ initials() }}</div>
          }
          <div class="user-info">
            <span class="user-name">{{ user?.fullName || 'User' }}</span>
            <span class="user-role">{{ roleLabel() }}</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet/>
    </main>
  </div>
</div>
