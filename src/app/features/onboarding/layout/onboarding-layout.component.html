<div class="ob-shell">
  <!-- Header -->
  <header class="ob-header">
    <div class="ob-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M5 20V15H0V5H5V0H15V5H20V15H15V20H5Z" fill="white"/>
        </svg>
      </div>
      <span class="logo-name">Dawava</span>
    </div>

    <div class="ob-header-right">
      <span class="ob-badge">Pharmacy Registration</span>
      <button class="theme-btn" (click)="toggleTheme()" [title]="theme.isDark() ? 'Light mode' : 'Dark mode'">
        @if (theme.isDark()) {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="ob-main">
    @if (showStepper()) {
      <app-onboarding-stepper [currentStep]="currentStep()" />
    }
    <router-outlet />
  </main>
</div>
